services:
  randomwordbot:
    container_name: randomwordbot
    image: git.postfmly.com/admin/randomwordbot:arm64
    restart: unless-stopped
    ports:
      - "8003:8003"
    volumes:
      - db:/app/db
    environment:
      - TZ=America/Chicago
    env_file: .env
    labels:
      - wud.display.name=RandomWordBot
      - homepage.group=Personal
      - homepage.name=RandomWordBot
      - homepage.icon=https://randomwordbot.postfmly.com/randomwordbot.webp

volumes:
  db:

networks: {}
